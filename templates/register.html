{% extends "base.html" %}
{% block title %}회원가입 — KBO 분석{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">⚾</div>
    <h2 class="auth-title">회원가입</h2>

    <form method="POST" action="/register" class="auth-form">
      <div class="form-group">
        <label>닉네임</label>
        <input type="text" name="name" placeholder="사용할 닉네임" required>
      </div>
      <div class="form-group">
        <label>이메일</label>
        <input type="email" name="email" placeholder="example@email.com" required>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" name="password" placeholder="8자 이상 권장" required minlength="6">
      </div>
      <button type="submit" class="btn-auth">가입하기</button>
    </form>

    <div class="divider"><span>또는 소셜 계정으로 바로 시작</span></div>

    <div class="social-btns">
      <a href="/auth/kakao" class="social-btn kakao">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#000000" xmlns="http://www.w3.org/2000/svg"><path d="M12 3C6.48 3 2 6.48 2 10.8c0 2.72 1.6 5.12 4 6.56l-1.04 3.84 4.48-2.96c.8.16 1.68.24 2.56.24 5.52 0 10-3.44 10-7.68S17.52 3 12 3z"/></svg>
        카카오
      </a>
      <a href="/auth/naver" class="social-btn naver">
        <span style="font-weight:700;font-size:14px;color:#fff;">N</span>
        네이버
      </a>
    </div>

    <p class="auth-switch">이미 계정이 있으신가요? <a href="/login">로그인</a></p>
  </div>
</div>
{% endblock %}
