{% extends "base.html" %}
{% block title %}경기현황 — KBO 분석{% endblock %}

{% block content %}
<div class="page-hero">
  <h1 class="hero-title">⚾ 오늘의 경기</h1>
  <p class="hero-sub">{{ today }} 실시간 KBO 경기 현황</p>
</div>

<div class="container">

  <!-- 오늘 경기 -->
  <section class="card-section">
    <h2 class="section-title">경기 일정</h2>
    <div id="gamesArea">
      <div class="empty-box"><p>⏳ 경기 정보 불러오는 중...</p></div>
    </div>
  </section>

  <!-- 팀 순위 -->
  <section class="card-section">
    <h2 class="section-title">팀 순위</h2>
    <div id="rankArea">
      <div class="empty-box"><p>⏳ 순위 불러오는 중...</p></div>
    </div>
  </section>

  <!-- 승률 차트 -->
  <section class="card-section" id="chartSection" style="display:none;">
    <h2 class="section-title">승률 차트</h2>
    <div class="chart-wrap">
      <canvas id="teamChart"></canvas>
    </div>
  </section>

</div>

<script>
fetch('/api/home')
  .then(r => r.json())
  .then(data => {
    renderGames(data.games);
    renderRanks(data.teams);
    if (data.teams && data.teams.length) renderChart(data.teams);
  })
  .catch(() => {
    document.getElementById('gamesArea').innerHTML = '<div class="empty-box"><p>데이터를 불러올 수 없어요. 잠시 후 새로고침 해주세요.</p></div>';
    document.getElementById('rankArea').innerHTML  = '<div class="empty-box"><p>데이터를 불러올 수 없어요.</p></div>';
  });

function renderGames(games) {
  if (!games || !games.length) {
    document.getElementById('gamesArea').innerHTML = '<div class="empty-box"><p>오늘은 경기가 없거나 아직 일정이 발표되지 않았어요.</p></div>';
    return;
  }
  let html = '<div class="games-grid">';
  games.forEach(g => {
    const tag  = g.game_code ? `<a href="/game/${g.game_code}" class="game-card game-card-link">` : '<div class="game-card">';
    const end  = g.game_code ? '</a>' : '</div>';
    const score = g.score || 'vs';
    const stad  = g.stadium ? `<div class="game-stadium">📍 ${g.stadium}</div>` : '';
    const hint  = g.game_code ? '<div class="game-detail-hint">기록 보기 →</div>' : '';
    html += `${tag}
      <div class="game-time">${g.time}${g.status ? ' · ' + g.status : ''}</div>
      <div class="game-teams">
        <span class="team away">${g.away}</span>
        <span class="game-score">${score}</span>
        <span class="team home">${g.home}</span>
      </div>
      ${stad}${hint}
    ${end}`;
  });
  html += '</div>';
  document.getElementById('gamesArea').innerHTML = html;
}

function renderRanks(teams) {
  if (!teams || !teams.length) {
    document.getElementById('rankArea').innerHTML = '<div class="empty-box"><p>순위 데이터를 불러올 수 없어요.</p></div>';
    return;
  }
  const medals = ['🥇','🥈','🥉'];
  let rows = teams.map((t, i) => `
    <tr class="${i < 5 ? 'playoff' : ''}">
      <td class="rank-cell">${medals[i] || t.rank}</td>
      <td class="team-name">${t.team}</td>
      <td>${t.games}</td>
      <td class="win">${t.wins}</td>
      <td class="loss">${t.losses}</td>
      <td>${t.draws}</td>
      <td class="pct">${t.pct}</td>
      <td>${t.gb}</td>
    </tr>`).join('');
  document.getElementById('rankArea').innerHTML = `
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>순위</th><th>팀</th><th>경기</th><th>승</th><th>패</th><th>무</th><th>승률</th><th>게임차</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p class="table-note">* 상위 5팀 포스트시즌 진출</p>`;
}

function renderChart(teams) {
  document.getElementById('chartSection').style.display = '';
  const labels = teams.map(t => t.team);
  const pcts   = teams.map(t => t.pct === '-' ? 0 : t.pct);
  const colors = labels.map((_, i) => `hsl(${210 + i * 15}, 70%, ${55 + i * 2}%)`);
  new Chart(document.getElementById('teamChart'), {
    type: 'bar',
    data: { labels, datasets: [{ label: '승률', data: pcts, backgroundColor: colors, borderRadius: 8 }] },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { min: 0, max: 1, ticks: { callback: v => (v * 100).toFixed(0) + '%' } } }
    }
  });
}
</script>
{% endblock %}
